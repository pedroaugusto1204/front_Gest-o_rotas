version: '3.8'

services:
  db:
    image: ankane/pgvector:v0.5.1
    container_name: antigraviti-db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: antigraviti
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d antigraviti"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: 
      context: c:/Users/amand/api_Saas_controlefuncionarios
    container_name: antigraviti-backend
    restart: always
    environment:
      - DATABASE_URL=postgresql://user:pass@db:5432/antigraviti
      - JWT_SECRET=chave_secreta_longa_aqui
      - PORT=3000
      - NODE_ENV=development
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/auth/login"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: >
      sh -c "npm run migrate && npm start"
    ports:
      - "3001:3000"

  frontend:
    build: 
      context: c:/Users/amand/Downloads/vast_front
    container_name: antigraviti-frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  postgres_data:
